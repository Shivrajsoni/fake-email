# HTTP reverse proxy: public port 80 -> Axum API on 127.0.0.1:3001
#
# AWS EC2: allow inbound TCP 80 on the Security Group.
# Ubuntu:
#   sudo apt install nginx
#   sudo ln -sf /path/to/repo/deploy/nginx/fake-email-api.conf /etc/nginx/sites-available/fake-email-api
#   sudo ln -sf /etc/nginx/sites-available/fake-email-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace api.example.com with your hostname (or _ for default_server).

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
