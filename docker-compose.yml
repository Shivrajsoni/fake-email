# Stack matches Docker on Ubuntu Server: Linux containers, no host isolation issues.
# - EC2 amd64: native build (no extra env).
# - Apple Silicon dev: match production with: export DOCKER_DEFAULT_PLATFORM=linux/amd64
#   before `docker compose build` (slower; uses emulation).
# - Small disks: use BuildKit and limit parallelism, e.g.
#     COMPOSE_PARALLEL_LIMIT=1 DOCKER_BUILDKIT=1 docker compose build
name: fake-email

services:
  postgres:
    image: postgres:16-alpine
    container_name: fake-email-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fake_email}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fake_email_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fake_email}
    # Inside the compose network, services still use postgres:5432.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fake_email} -d ${POSTGRES_DB:-fake_email}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    build:
      context: .
      dockerfile: crates/db/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fake_email}:${POSTGRES_PASSWORD:-fake_email_dev}@postgres:5432/${POSTGRES_DB:-fake_email}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  http-server:
    build:
      context: .
      dockerfile: Dockerfile.apps
      target: runtime-http
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fake_email}:${POSTGRES_PASSWORD:-fake_email_dev}@postgres:5432/${POSTGRES_DB:-fake_email}?sslmode=disable
      DOMAIN: ${DOMAIN}
      PORT: ${HTTP_PORT:-3001}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-3001}:${HTTP_PORT:-3001}"

  smtp-server:
    build:
      context: .
      dockerfile: Dockerfile.apps
      target: runtime-smtp
    restart: unless-stopped
    # Non-root image can bind SMTP_PORT=25 on Linux (e.g. Ubuntu production).
    cap_add:
      - NET_BIND_SERVICE
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fake_email}:${POSTGRES_PASSWORD:-fake_email_dev}@postgres:5432/${POSTGRES_DB:-fake_email}?sslmode=disable
      DOMAIN: ${DOMAIN}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_BANNER_HOST: ${SMTP_BANNER_HOST:-}
      SMTP_MAX_MESSAGE_BYTES: ${SMTP_MAX_MESSAGE_BYTES:-10485760}
      SMTP_COMMAND_TIMEOUT_SECS: ${SMTP_COMMAND_TIMEOUT_SECS:-120}
      SMTP_DATA_TIMEOUT_SECS: ${SMTP_DATA_TIMEOUT_SECS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SMTP_PORT:-2525}:${SMTP_PORT:-2525}"

volumes:
  postgres_data:
